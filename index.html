<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Breaker 🔐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Code Breaker 🔐</h1>
        
        <div id="status-board">
            <p id="game-id-display">Game ID: <span id="display-id">---</span></p>
            <p id="turn-indicator">Ready to play?</p>
        </div>

        <div id="setup-section">
            <button id="btn-create">Create New Game</button>
            <div style="margin: 20px 0;">-- OR --</div>
            <input type="text" id="join-id-input" placeholder="Enter Game ID">
            <button id="btn-join">Join Game</button>
        </div>

        <div id="play-area" class="hidden">
            <div id="guess-log"></div>
            <div class="input-group">
                <input type="number" id="player-guess" placeholder="4-digit code" maxlength="4">
                <button id="btn-submit-guess">Submit Guess</button>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
